# render.yaml — Render Blueprint (Infrastructure as Code)
# Docs: https://render.com/docs/blueprint-spec
#
# How to use:
#   1. Push this file to the root of your repo on the `main` branch
#   2. Render Dashboard → New → Blueprint Instance → connect this repo
#   3. Render will auto-create the "solarspot-api" web service
#   4. After creation, go to the service → Environment and fill in every
#      variable that shows "(set in dashboard)" below
#   5. Set autoDeploy to false in the Render dashboard if you want GitHub
#      Actions to be the sole deploy trigger (recommended — see deploy.yml)

services:
  - type: web
    name: solarspot-api
    # runtime: node → Render runs buildCommand then startCommand directly.
    # More reliable than Docker runtime on the free plan (Docker builds
    # frequently timeout on the shared free builder).
    runtime: node
    branch: main
    # Compile TypeScript → produces dist/
    buildCommand: npm ci && npm run build
    # Run the compiled JS (same as `npm start` in package.json)
    startCommand: node dist/server.js
    # Disable Render's built-in auto-deploy so that only a passing CI
    # pipeline (via the GitHub Actions deploy hook) can trigger a release.
    autoDeploy: false
    # Health check — must return 2xx on each deploy.
    # Render marks the deploy as failed and keeps the old version if this fails.
    healthCheckPath: /api/health
    # Free plan ONLY supports the Oregon (US West) region.
    # Paid plans unlock Singapore, Frankfurt, Ohio, Virginia, São Paulo.
    region: oregon
    plan: free
    # ── Environment Variables ──────────────────────────────────────────────────
    # Values marked  sync: false  must be entered manually in the dashboard.
    # Values with    generateValue: true  are auto-generated by Render (safe).
    # Everything else is a plain, non-secret default.
    envVars:
      # Runtime
      - key: NODE_ENV
        value: production

      # Port — must match the EXPOSE in your Dockerfile and app listen()
      - key: PORT
        value: 5000

      # ── Database (set in dashboard) ─────────────────────────────────────────
      - key: MONGODB_URI
        sync: false          # paste your MongoDB Atlas SRV connection string

      # ── JWT (auto-generated — copy values to the frontend env if needed) ────
      # ── App identity ─────────────────────────────────────────────────────────
      - key: APP_NAME
        value: SolarSpot

      # Your Render service public URL — needed for email verify/reset links.
      # Set AFTER first deploy when you know the URL, e.g. https://solarspot-api.onrender.com
      - key: APP_URL
        sync: false

      # ── Database ─────────────────────────────────────────────────────────────
      - key: MONGODB_DB_NAME
        value: solarspot

      # ── Auth ─────────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true  # Render generates a cryptographically secure value

      - key: JWT_ACCESS_EXPIRES
        value: 15m

      - key: JWT_REFRESH_EXPIRES
        value: 7d

      # used by cookie-parser signed cookies
      - key: COOKIE_SECRET
        generateValue: true

      # ── CORS ─────────────────────────────────────────────────────────────────
      # Must match your Vercel URL exactly — no trailing slash.
      - key: FRONTEND_URL
        sync: false          # e.g. https://solarspot.vercel.app

      # ── Email — Brevo SMTP (set in dashboard) ────────────────────────────────
      # Variable names must match exactly what env.ts reads via process.env.*
      - key: EMAIL_HOST
        value: smtp-relay.brevo.com

      - key: EMAIL_PORT
        value: "587"

      - key: EMAIL_SECURE
        value: "false"

      - key: EMAIL_USER
        sync: false          # your Brevo login email

      - key: EMAIL_PASS
        sync: false          # your Brevo SMTP API key

      - key: EMAIL_FROM_NAME
        value: SolarSpot

      - key: EMAIL_FROM_ADDRESS
        sync: false          # e.g. no-reply@solarspot.app

      - key: EMAIL_PREVIEW
        value: "false"       # always false in production

      # ── Third-party APIs (set in dashboard) ─────────────────────────────────
      - key: OPENWEATHER_API_KEY
        sync: false

      - key: PERSPECTIVE_API_KEY
        sync: false

      # ── Cloudinary — image CDN (set in dashboard) ────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false

      - key: CLOUDINARY_API_KEY
        sync: false

      - key: CLOUDINARY_API_SECRET
        sync: false
