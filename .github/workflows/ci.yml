name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      NODE_ENV: test
      JWT_SECRET: ci_test_secret_minimum_32_chars_here
      JWT_REFRESH_SECRET: ci_refresh_secret_minimum_32_chars
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      FRONTEND_URL: http://localhost:3000
      OPENWEATHERMAP_API_KEY: ${{ secrets.OPENWEATHERMAP_API_KEY }}
      PERSPECTIVE_API_KEY: ${{ secrets.PERSPECTIVE_API_KEY }}
      BREVO_SMTP_USER: ${{ secrets.BREVO_SMTP_USER }}
      BREVO_SMTP_PASS: ${{ secrets.BREVO_SMTP_PASS }}
      EMAIL_FROM: test@solarspot.app
      BREVO_SMTP_HOST: smtp-relay.brevo.com
      BREVO_SMTP_PORT: "587"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit
