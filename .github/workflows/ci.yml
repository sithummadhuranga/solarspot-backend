name: CI

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

# Cancel previous runs on the same branch when a new push arrives.
# Saves CI minutes on fast-moving feature branches.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Stage 1a: ESLint ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Stage 1b: TypeScript (runs in parallel with lint) ────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler check
        run: npx tsc --noEmit

  # ── Stage 2: Unit tests (needs both lint + typecheck to pass) ────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      NODE_ENV: test
      # Dummy secrets for CI — never use real credentials here.
      MONGODB_URI: mongodb://localhost:27017/solarspot_test
      JWT_SECRET: ci_test_jwt_secret_must_be_64_chars_long_for_compliance_xyz_abc
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      COOKIE_SECRET: ci_cookie_secret_must_be_32_chars_xQ
      FRONTEND_URL: http://localhost:5173
      APP_URL: http://localhost:5173
      APP_NAME: SolarSpot
      EMAIL_HOST: smtp-relay.brevo.com
      EMAIL_PORT: "587"
      EMAIL_SECURE: "false"
      EMAIL_FROM_NAME: SolarSpot
      EMAIL_FROM_ADDRESS: test@solarspot.app
      EMAIL_PREVIEW: "true"
      # Real keys from repo secrets (optional — unit tests mock these, integration tests skip if absent)
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      PERSPECTIVE_API_KEY: ${{ secrets.PERSPECTIVE_API_KEY }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Stage 3: Production build (needs tests to pass) ──────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript for production
        run: npm run build

      - name: Verify dist/server.js exists
        run: test -f dist/server.js
